<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publiczny Rejestr</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .log-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #d32f2f; }
        .log-date { font-size: 11px; color: #888; }
        .log-type { font-weight: bold; font-size: 14px; margin: 4px 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">‹ Wróć</a>
            <span>Rejestr Zgłoszeń</span>
            <span style="width:50px"></span>
        </div>
        <div class="content">
            <div id="lista-logow">Ładowanie danych z chmury...</div>
            <button class="btn-primary" onclick="pobierzPlik()" style="background:#34c759; margin-top:20px">Pobierz logi (.txt)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0",
            measurementId: "G-HE1H1FKJMR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allLogs = [];

        db.ref('logi').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('lista-logow');
            container.innerHTML = '';
            allLogs = [];

            if(!data) {
                container.innerHTML = "Brak zgłoszeń w chmurze.";
                return;
            }

            for(let id in data) {
                allLogs.push(data[id]);
                const item = data[id];
                container.innerHTML = `
                    <div class="log-card">
                        <div class="log-date">${item.data}</div>
                        <div class="log-type">${item.typ}</div>
                        <div style="font-size:12px">📍 ${item.loc}</div>
                        <div style="font-size:12px; color:#444">📝 ${item.desc}</div>
                        <div style="font-size:10px; color:green; font-weight:bold; margin-top:5px">✓ ANONIMOWE</div>
                    </div>
                ` + container.innerHTML;
            }
        });

        function pobierzPlik() {
            let txt = "GLOBALNY REJESTR KONFOBYWATEL\n\n";
            allLogs.slice().reverse().forEach(l => {
                txt += `${l.data} | ${l.typ} | ${l.loc}\nOpis: ${l.desc}\nFoto: ${l.foto}\n----------------\n`;
            });
            const blob = new Blob([txt], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'logi_konfobywatel.txt';
            a.click();
        }
    </script>
</body>
</html>
