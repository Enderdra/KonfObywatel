<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dowodzenia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .log-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #d32f2f; }
        .login-box { background: white; border-radius: 12px; padding: 20px; text-align: center; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header"><a href="index.html" class="back-btn">‹ Wróć</a><span>Panel Admina</span><span style="width:50px"></span></div>
        <div class="content">

            <div id="login-screen" class="login-box">
                <h3 style="color: #d32f2f;">Autoryzacja Służbowa</h3>
                <input type="email" id="email" placeholder="E-mail oficera">
                <input type="password" id="password" placeholder="Hasło">
                <button class="btn-primary" onclick="handleLogin()">Zaloguj do systemu</button>
            </div>

            <div id="data-screen" style="display: none;">
                <div id="lista-logow">Pobieranie tajnych danych...</div>
                <button class="btn-primary" onclick="pobierzPlik()" style="background:#34c759; margin-top:20px">Pobierz raport (.txt)</button>
                <button onclick="firebase.auth().signOut().then(()=>location.reload())" style="background:none; border:none; color:grey; width:100%; margin-top:15px; cursor:pointer;">Wyloguj</button>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0"
        };
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .catch(err => alert("Błąd autoryzacji: Niepoprawne dane lub brak uprawnień."));
        }

        // Sprawdzaj czy użytkownik jest zalogowany
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('data-screen').style.display = 'block';
                ladujDane();
            }
        });

        let allLogs = [];
        function ladujDane() {
            firebase.database().ref('logi').on('value', snap => {
                const data = snap.val();
                const container = document.getElementById('lista-logow');
                container.innerHTML = ''; allLogs = [];
                if(!data) { container.innerHTML = "Baza jest pusta."; return; }
                for(let id in data) {
                    allLogs.push(data[id]);
                    container.innerHTML = `<div class="log-card"><b>${data[id].data}</b><br>Typ: ${data[id].typ}<br>Lok: ${data[id].loc}</div>` + container.innerHTML;
                }
            }, err => {
                alert("Błąd dostępu do bazy! Twoje konto nie ma uprawnień odczytu.");
            });
        }

        function pobierzPlik() {
            let txt = "TAJNY RAPORT\n\n";
            allLogs.slice().reverse().forEach(l => txt += `${l.data} | ${l.typ} | ${l.loc}\nOpis: ${l.desc}\n---\n`);
            const blob = new Blob([txt], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'raport.txt'; a.click();
        }
    </script>
</body>
</html>
