<!DOCTYPE html>
<html lang="pl">
<head>
    <script>
        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowe Zgłoszenie - KonfObywatel</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK (Wersja Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        .file-input-wrapper { background: #f8f8f8; border: 2px dashed #c7c7cc; border-radius: 8px; text-align: center; padding: 20px; cursor: pointer; }
        .disclaimer-text { font-size: 11px; color: #d32f2f; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="services.html" class="back-btn">‹ Anuluj</a>
            <span>Nowe Zgłoszenie</span>
            <span style="width:50px"></span>
        </div>
        <div class="content">
            <div class="section-title">Szczegóły donosu</div>
            <div class="form-group">
                <label>Typ przewinienia</label>
                <select id="typ">
                    <option>Granie w siatkę na boisku do piłki nożnej</option>
                    <option>Drzewa zahaczające o druty elektryczne</option>
                    <option>Zasłonięta tablica rejestracyjna</option>
                    <option>Przechodzenie przez ulicę na czerwonym świetle</option>
                    <option>Jazda bez biletu komunikacją miejską</option>
                    <option>Zakłócanie ciszy nocnej</option>
                    <option>Wykraczanie za pole do parkowania</option>
                    <option>Spożywanie alkoholu w miejscu publicznym</option>
                    <option>Jazda po chodniku rowerem</option>
                    <option>Malowanie graffiti</option>
                    <option>Palenie w miejscu zakazanym</option>
                    <option>Pylenie z komina / Inne</option>
                </select>
            </div>
            <div class="form-group"><label>Lokalizacja</label><input type="text" id="loc" placeholder="Ulica, numer bloku..."></div>
            <div class="form-group"><label>Opis szczegółowy</label><textarea id="desc" rows="3" placeholder="Opisz sytuację..."></textarea></div>
            <div class="form-group">
                <label>Dowód (Foto)</label>
                <div class="file-input-wrapper" onclick="document.getElementById('foto').click()">
                    <input type="file" id="foto" accept="image/*" hidden onchange="document.getElementById('fname').innerText='✓ Załączono dowód'">
                    <span id="fname">📸 Dodaj zdjęcie z ukrycia</span>
                </div>
            </div>
            <button class="btn-primary" onclick="send()">Wyślij zgłoszenie</button>
            <div class="disclaimer-text">⚠️ Zgłoszenia trafiają do tajnego rejestru, dostępnego tylko dla oficerów z hasłem.</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0",
            measurementId: "G-HE1H1FKJMR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = 'login.html';
            }
        });

        function send() {
            if (!currentUser) {
                alert("Błąd autoryzacji. Zaloguj się ponownie.");
                return;
            }

            const typVal = document.getElementById('typ').value;
            const locVal = document.getElementById('loc').value || "Nie podano";
            const descVal = document.getElementById('desc').value || "Brak opisu";
            const dataStr = new Date().toLocaleString('pl-PL');

            const logData = {
                data: dataStr,
                typ: typVal,
                loc: locVal,
                desc: descVal,
                foto: document.getElementById('foto').files.length > 0 ? "TAK" : "NIE",
                uid: currentUser.uid
            };

            // 1. Zapisujemy log w bazie
            db.ref('logi').push(logData).then(() => {
                // 2. Pobieramy punkty użytkownika, dodajemy +25 pkt oraz zapisujemy historię
                const userRef = db.ref('users_data/' + currentUser.uid);

                userRef.once('value').then((snapshot) => {
                    let punktyAktualne = 0;
                    if (snapshot.exists() && snapshot.val().punkty) {
                        punktyAktualne = snapshot.val().punkty;
                    }

                    const nowePunkty = punktyAktualne + 25;

                    // Aktualizacja punktów w profilu
                    userRef.update({ punkty: nowePunkty });

                    // Dodanie wpisu do historii punktów
                    const histRef = db.ref('users_data/' + currentUser.uid + '/historia');
                    histRef.push({
                        punkty: 25,
                        tytul: "Donos: " + typVal,
                        data: dataStr
                    });

                    alert("Zgłoszenie wysłane do tajnej bazy! Otrzymano +25 pkt.");
                    window.location.href = 'services.html';
                });
            }).catch((error) => {
                alert("Błąd wysyłania zgłoszenia: " + error.message);
            });
        }
    </script>
</body>
</html>
