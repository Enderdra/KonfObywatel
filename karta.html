<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twoja Karta</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-btn">‹ Wróć</a>
            <span>Karta Konfidenta</span>
            <span style="width:50px"></span>
        </div>
        <div class="content">
            
            <div id="capture-area" class="id-card">
                <div class="id-title">Karta Stałego Konfidenta</div>
                
                <div class="id-grid">
                    <div>
                        <label for="img-input" class="photo-box">
                            <input type="file" id="img-input" hidden accept="image/*">
                            <span id="label-text">Kliknij<br>aby dodać zdjęcie</span>
                            <img id="preview" src="" alt="twoje zdjęcie">
                        </label>
                        <div class="field">
                            <div class="field-label">pseudonim</div>
                            <input type="text" class="field-input" value="Sygnalista">
                        </div>
                        <div class="field">
                            <div class="field-label">imie i nazwisko</div>
                            <input type="text" class="field-input" value="Janusz Nosacz">
                        </div>
                        <div class="field">
                            <div class="field-label">pakiet</div>
                            <div class="field-value-text">PLATINUM</div>
                        </div>
                    </div>

                    <div>
                        <div class="symbols-box">
                            <div class="symbol">🦅</div>
                            <div class="symbol">👮‍♂️</div>
                        </div>
                        <div class="field" style="text-align: right;">
                            <div class="field-label">ważna do:</div>
                            <div class="field-value-text">Dożywocie</div>
                        </div>
                        <div class="field" style="text-align: right; margin-top: 20px;">
                            <div class="field-label">Nadane z art.</div>
                            <div class="field-value-text">ART.60 PAR.1</div>
                        </div>
                    </div>
                </div>

                <div class="police-footer">P O L I C J A</div>
            </div>

            <button class="btn-primary" onclick="downloadID()">Pobierz do galerii (JPG)</button>
        </div>
    </div>

    <script>
        // Obsługa wgrywania zdjęcia
        const input = document.getElementById('img-input');
        input.onchange = e => {
            const [file] = input.files;
            if (file) {
                document.getElementById('preview').src = URL.createObjectURL(file);
                document.getElementById('preview').style.display = 'block';
                document.getElementById('label-text').style.display = 'none';
            }
        }

        // Obsługa pobierania karty
        function downloadID() {
            // Ukrywamy ewentualne migające kursory w inputach przed zrobieniem screena
            document.activeElement.blur(); 
            
            html2canvas(document.getElementById('capture-area'), {
                scale: 2, // Lepsza jakość obrazka
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'karta-konfidenta.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>
