<!DOCTYPE html>
<html lang="pl">
<head>
    <script>
        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Edycja Danych - KonfObywatel</title>
    
    <!-- Usunięto link do style.css aby uniknąć konfliktów układu -->
    
    <!-- Firebase SDK (Wersja Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f2f2f7; color: #1a1a1c; display: block; }
        
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: #f2f2f7; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5e5ea; }
        .back-btn { color: #0052cc; text-decoration: none; font-size: 17px; font-weight: 500; min-width: 60px; }
        .header-title { flex: 1; text-align: center; font-size: 17px; font-weight: 700; }
        .header-placeholder { min-width: 60px; }
        
        main { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        .form-group { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; }
        .form-group input { width: 100%; border: none; font-size: 16px; font-weight: 700; outline: none; background: transparent; color: #1a1a1c; }
        
        .photo-upload { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .photo-preview { width: 80px; height: 100px; background: #e5e5ea; border-radius: 8px; object-fit: cover; }
        .upload-btn { background: #0052cc; color: white; padding: 10px 15px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-block; text-align: center; }
        
        .save-btn { width: 100%; background: #16a34a; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; margin-top: 10px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="wiecej.html" class="back-btn">‹ Wróć</a>
        <div class="header-title">Edycja Danych</div>
        <div class="header-placeholder"></div>
    </header>

    <main>
        <div class="form-group">
            <label>Zdjęcie profilowe (lokalne)</label>
            <div class="photo-upload">
                <img id="edit-photo-preview" class="photo-preview" src="">
                <label class="upload-btn">
                    Wybierz zdjęcie
                    <input type="file" id="edit-photo-input" hidden accept="image/*">
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Pseudonim (Kryptonim)</label>
            <input type="text" id="inp-pseudo" placeholder="Wpisz pseudonim">
        </div>
        <div class="form-group">
            <label>Imię i nazwisko</label>
            <input type="text" id="inp-imie" placeholder="Wpisz imię i nazwisko">
        </div>
        <div class="form-group">
            <label>Obywatelstwo</label>
            <input type="text" id="inp-obywatelstwo" placeholder="POLSKIE">
        </div>
        <div class="form-group">
            <label>Pakiet zaangażowania</label>
            <input type="text" id="inp-pakiet" placeholder="Np. PLATINUM">
        </div>
        <div class="form-group">
            <label>Numer ewidencyjny (PESEL)</label>
            <input type="number" id="inp-pesel" placeholder="Twój nr ewidencyjny">
        </div>
        <div class="form-group">
            <label>Seria i numer karty</label>
            <input type="text" id="inp-seria" placeholder="Np. KONF 80112" style="text-transform: uppercase;">
        </div>

        <button class="save-btn" onclick="zapiszDane()">Zapisz i synchronizuj z Centralą</button>
    </main>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0",
            measurementId: "G-HE1H1FKJMR"
        };
        firebase.initializeApp(firebaseConfig);

        let userUID = null;

        // Autoryzacja
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                userUID = user.uid;
                ladowanieDanych(userUID);
            } else {
                console.warn("Brak aktywnej sesji Firebase Auth!");
                alert("Nie jesteś zalogowany w Firebase! Baza danych może odrzucić zapis (brak uprawnień).");
            }
        });

        function ladowanieDanych(uid) {
            const savedPhoto = localStorage.getItem('profileImage');
            if (savedPhoto) document.getElementById('edit-photo-preview').src = savedPhoto;

            firebase.database().ref('users_data/' + uid).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('inp-pseudo').value = data.pseudonim || "";
                    document.getElementById('inp-imie').value = data.imie_nazwisko || "";
                    document.getElementById('inp-obywatelstwo').value = data.obywatelstwo || "";
                    document.getElementById('inp-pakiet').value = data.pakiet || "";
                    document.getElementById('inp-pesel').value = data.pesel || "";
                    document.getElementById('inp-seria').value = data.seria_numer || "";
                }
            });
        }

        document.getElementById('edit-photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64String = event.target.result;
                    document.getElementById('edit-photo-preview').src = base64String;
                    localStorage.setItem('profileImage', base64String);
                };
                reader.readAsDataURL(file);
            }
        });

        function zapiszDane() {
            if (!userUID) {
                alert("Błąd: Nie wykryto autoryzacji Firebase (UID). Nie można zapisać danych do bazy.");
                return;
            }

            const userData = {
                pseudonim: document.getElementById('inp-pseudo').value,
                imie_nazwisko: document.getElementById('inp-imie').value,
                obywatelstwo: document.getElementById('inp-obywatelstwo').value,
                pakiet: document.getElementById('inp-pakiet').value,
                pesel: document.getElementById('inp-pesel').value,
                seria_numer: document.getElementById('inp-seria').value.toUpperCase()
            };

            firebase.database().ref('users_data/' + userUID).set(userData).then(() => {
                alert("Dane zostały zsynchronizowane pomyślnie!");
                window.location.href = 'karta.html';
            }).catch((error) => {
                alert("Odmowa dostępu z bazy: " + error.message);
            });
        }
    </script>
</body>
</html>
