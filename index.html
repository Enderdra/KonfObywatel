<!DOCTYPE html>
<html lang="pl">
<head>
    <script>
        // Sprawdzanie trybu ciemnego (pozostawione bez zmian)
        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktywacja - KonfObywatel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #1a1a1c; padding: 20px; }
        
        .card { background: #ffffff; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04); text-align: center; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; margin-bottom: 25px; }
        
        input { width: 100%; padding: 16px; font-size: 16px; border: 1px solid #d1d5db; border-radius: 12px; margin-bottom: 15px; outline: none; text-align: center; font-weight: 700; transition: 0.2s; }
        input:focus { border-color: #0052cc; }
        input:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
        
        #klucz { text-transform: uppercase; letter-spacing: 2px; }
        
        button { width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; background: #0052cc; color: white; transition: 0.2s; }
        button:active { background: #0040a0; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        #msg { margin-top: 15px; font-size: 13px; font-weight: 600; min-height: 20px; }
        .error { color: #d32f2f; }
        .success { color: #16a34a; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 40px; margin-bottom: 10px;">🦅</div>
        <h1>Aktywacja Systemu</h1>
        <p>Wprowadź swój unikalny nick oraz klucz licencyjny.</p>

        <input type="text" id="nick" placeholder="Twój unikalny Nick" maxlength="20">
        <input type="text" id="klucz" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
        
        <button onclick="aktywujUrzadzenie()" id="btn-aktywuj">Zweryfikuj tożsamość</button>
        <div id="msg"></div>
    </div>

    <script>
        // 1. FORMATOWANIE POLA KLUCZA
        const kluczInput = document.getElementById('klucz');
        kluczInput.addEventListener('input', function(e) {
            let target = e.target;
            let val = target.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            let newString = '';
            for (let i = 0; i < val.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    newString += '-';
                }
                newString += val[i];
            }
            target.value = newString;
        });

        // 2. KONFIGURACJA FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0",
            measurementId: "G-HE1H1FKJMR"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // --- NOWOŚĆ: 3. ZAAWANSOWANA BRAMKA WERYFIKACYJNA NA ŻYWO ---
        const zapisanyKlucz = localStorage.getItem('licencja_id');
        const zapisanyNick = localStorage.getItem('uzytkownik_nick');
        const poleNick = document.getElementById('nick');
        const poleKlucz = document.getElementById('klucz');
        const btnAktywuj = document.getElementById('btn-aktywuj');
        const msgBox = document.getElementById('msg');

        if (zapisanyKlucz && zapisanyNick) {
            // Urządzenie ma zapisaną licencję - blokujemy interfejs i pytamy serwer
            poleNick.disabled = true;
            poleKlucz.disabled = true;
            btnAktywuj.disabled = true;
            poleNick.value = zapisanyNick;
            poleKlucz.value = zapisanyKlucz;
            
            msgBox.style.color = '#0052cc';
            msgBox.innerText = "Synchronizacja ze Sztabem Głównym...";

            database.ref('klucze/' + zapisanyKlucz).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const daneKlucza = snapshot.val();
                    
                    if (daneKlucza.aktywny === true && daneKlucza.nick === zapisanyNick) {
                        // Licencja jest ważna i nick się zgadza - wpuszczamy do środka!
                        window.location.replace('login.html');
                    } else {
                        // Licencja zablokowana przez Admina lub zmieniono Nick w panelu
                        WyczyscDostep("Odmowa dostępu! Twoja licencja została zablokowana lub unieważniona przez Dowództwo.");
                    }
                } else {
                    // Klucz został całkowicie usunięty z bazy
                    WyczyscDostep("Błąd krytyczny. Licencja została trwale usunięta z bazy głównej.");
                }
            }).catch((error) => {
                msgBox.className = 'error';
                msgBox.innerText = "Brak połączenia z centralą. Wymagany internet do weryfikacji.";
                console.error(error);
                // Nie czyścimy kluczy, czekamy aż użytkownik odzyska internet
            });
        }

        function WyczyscDostep(komunikat) {
            localStorage.removeItem('urzadzenie_autoryzowane');
            localStorage.removeItem('licencja_id');
            localStorage.removeItem('uzytkownik_nick');
            
            poleNick.disabled = false;
            poleKlucz.disabled = false;
            btnAktywuj.disabled = false;
            poleNick.value = '';
            poleKlucz.value = '';
            
            msgBox.className = 'error';
            msgBox.innerText = komunikat;
        }

        // 4. LOGIKA NOWEJ AKTYWACJI (Dla świeżych urządzeń)
        function aktywujUrzadzenie() {
            const nick = poleNick.value.trim();
            const klucz = poleKlucz.value.trim();

            if (!nick) {
                msgBox.className = 'error';
                msgBox.innerText = "Musisz podać swój unikalny nick!";
                return;
            }

            const regexKlucza = /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
            if (!regexKlucza.test(klucz)) {
                msgBox.className = 'error';
                msgBox.innerText = "Nieprawidłowy format klucza! (Oczekiwany: XXXX-XXXX-XXXX-XXXX)";
                return;
            }

            msgBox.className = '';
            msgBox.style.color = '#666';
            msgBox.innerText = "Sprawdzanie w bazie centralnej...";
            btnAktywuj.disabled = true;

            database.ref('klucze/' + klucz).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const daneKlucza = snapshot.val();
                    
                    if (daneKlucza.aktywny !== true) {
                        msgBox.className = 'error';
                        msgBox.innerText = "Odmowa dostępu. Ten klucz został zablokowany.";
                        btnAktywuj.disabled = false;
                        return;
                    }

                    if (daneKlucza.nick !== nick) {
                        msgBox.className = 'error';
                        msgBox.innerText = "Błąd autoryzacji! Podany Nick nie jest przypisany do tego klucza.";
                        btnAktywuj.disabled = false;
                        return;
                    }

                    if (daneKlucza.wykorzystany === true) {
                        msgBox.className = 'error';
                        msgBox.innerText = "Odmowa dostępu. Ten klucz został już wykorzystany na innym urządzeniu!";
                        btnAktywuj.disabled = false;
                        return;
                    }

                    msgBox.className = 'success';
                    msgBox.innerText = "Weryfikacja pomyślna! Ładowanie systemu...";
                    
                    // Oznacz jako wykorzystany
                    database.ref('klucze/' + klucz).update({ wykorzystany: true }).then(() => {
                        localStorage.setItem('urzadzenie_autoryzowane', 'TAK');
                        localStorage.setItem('licencja_id', klucz);
                        localStorage.setItem('uzytkownik_nick', nick); 
                        
                        setTimeout(() => {
                            window.location.replace('login.html');
                        }, 1000);
                    }).catch((error) => {
                        msgBox.className = 'error';
                        msgBox.innerText = "Błąd zapisu w bazie. Spróbuj ponownie.";
                        btnAktywuj.disabled = false;
                    });

                } else {
                    msgBox.className = 'error';
                    msgBox.innerText = "Nie znaleziono takiego klucza w rejestrze centralnym.";
                    btnAktywuj.disabled = false;
                }
            }).catch((error) => {
                msgBox.className = 'error';
                msgBox.innerText = "Błąd połączenia z serwerem. Sprawdź internet.";
                btnAktywuj.disabled = false;
            });
        }
    </script>
</body>
</html>
