<!DOCTYPE html>
<html lang="pl">
<head>
    <script>
        if (localStorage.getItem('dark-mode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Węzeł Dostępowy - KonfObywatel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- BIBLIOTEKI FIREBASE (W TYM NOWA: AUTH) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #1a1a1c; padding: 20px; }
        
        .card { background: #ffffff; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04); text-align: center; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.5; }
        
        input { width: 100%; padding: 16px; font-size: 15px; border: 1px solid #d1d5db; border-radius: 12px; margin-bottom: 12px; outline: none; text-align: center; font-weight: 600; transition: 0.2s; }
        input:focus { border-color: #0052cc; }
        input:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
        
        #klucz { text-transform: uppercase; letter-spacing: 2px; font-weight: 700;}
        
        button { width: 100%; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; margin-bottom: 10px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-primary { background: #0052cc; color: white; }
        .btn-primary:active { background: #0040a0; }
        
        .btn-outline { background: transparent; color: #0052cc; border: 2px solid #0052cc; }
        .btn-outline:active { background: #f0f4f8; }

        .btn-google { background: #ffffff; color: #333; border: 1px solid #d1d5db; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:active { background: #f9fafb; }
        
        .btn-danger-text { background: transparent; color: #d32f2f; font-size: 13px; padding: 10px; margin-top: 5px; }

        .divider { display: flex; align-items: center; text-align: center; margin: 15px 0; color: #9ca3af; font-size: 12px; font-weight: 600; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e7eb; }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }

        #msg { margin-top: 15px; font-size: 13px; font-weight: 600; min-height: 20px; }
        .error { color: #d32f2f; }
        .success { color: #16a34a; }
        .info { color: #0052cc; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div style="font-size: 40px; margin-bottom: 10px;">🦅</div>
        
        <!-- WIDOK 1: ŁADOWANIE -->
        <div id="view-loading">
            <h1>Autoryzacja...</h1>
            <p>Nawiązywanie połączenia ze sztabem.</p>
        </div>

        <!-- WIDOK 2: LOGOWANIE / REJESTRACJA KONTA -->
        <div id="view-auth" style="display: none;">
            <h1>Brama Główna</h1>
            <p>Zaloguj się lub załóż konto dowódcy.</p>
            
            <input type="email" id="email" placeholder="Adres E-mail">
            <input type="password" id="password" placeholder="Hasło (min. 6 znaków)">
            
            <button class="btn-primary" onclick="zalogujEmailem()">Zaloguj się</button>
            <button class="btn-outline" onclick="zarejestrujEmailem()">Załóż nowe konto</button>
            
            <div class="divider">LUB</div>
            
            <button class="btn-google" onclick="zalogujGoogle()">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Zaloguj przez Google
            </button>
        </div>

        <!-- WIDOK 3: AKTYWACJA LICENCJI (Dla nowych kont) -->
        <div id="view-license" style="display: none;">
            <h1>Aktywacja Licencji</h1>
            <p>Twoje konto nie ma przypisanego klucza. Zostanie on trwale powiązany z tym kontem.</p>

            <input type="text" id="nick" placeholder="Twój unikalny Nick" maxlength="20">
            <input type="text" id="klucz" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
            
            <button class="btn-primary" onclick="aktywujUrzadzenie()" id="btn-aktywuj">Zweryfikuj tożsamość</button>
            <button class="btn-danger-text" onclick="wylogujKonto()">Zmień konto (Wyloguj)</button>
        </div>

        <div id="msg"></div>
    </div>

    <script>
        // 1. FORMATOWANIE POLA KLUCZA
        const kluczInput = document.getElementById('klucz');
        kluczInput.addEventListener('input', function(e) {
            let target = e.target;
            let val = target.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            let newString = '';
            for (let i = 0; i < val.length; i++) {
                if (i > 0 && i % 4 === 0) newString += '-';
                newString += val[i];
            }
            target.value = newString;
        });

        // 2. KONFIGURACJA FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBriNFQP3gShatXR4qciLb9QoZfWrKY70I",
            authDomain: "konfobywatel-331d6.firebaseapp.com",
            databaseURL: "https://konfobywatel-331d6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "konfobywatel-331d6",
            storageBucket: "konfobywatel-331d6.firebasestorage.app",
            messagingSenderId: "695478312817",
            appId: "1:695478312817:web:41ef61675267dd936da0d0",
            measurementId: "G-HE1H1FKJMR"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;

        // Elementy UI
        const viewLoading = document.getElementById('view-loading');
        const viewAuth = document.getElementById('view-auth');
        const viewLicense = document.getElementById('view-license');
        const msgBox = document.getElementById('msg');

        function pokazWidok(widok) {
            viewLoading.style.display = 'none';
            viewAuth.style.display = 'none';
            viewLicense.style.display = 'none';
            document.getElementById(widok).style.display = 'block';
            msgBox.innerText = '';
        }

        // --- 3. SYSTEM ZARZĄDZANIA SESJĄ (AUTH) ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                sprawdzLicencjeKonta(user.uid);
            } else {
                currentUser = null;
                pokazWidok('view-auth');
            }
        });

        // Wyszukiwanie klucza powiązanego z UID (Wykorzystuje regułę .indexOn)
        function sprawdzLicencjeKonta(uid) {
            pokazWidok('view-loading');
            msgBox.className = 'info';
            msgBox.innerText = "Sprawdzanie rejestru licencji...";

            database.ref('klucze').orderByChild('uid_wlasciciela').equalTo(uid).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        // Znaleziono klucz przypisany do tego UID!
                        let znalezionyKlucz = null;
                        let daneKlucza = null;
                        
                        snapshot.forEach((child) => {
                            znalezionyKlucz = child.key;
                            daneKlucza = child.val();
                        });

                        if (daneKlucza.aktywny === true) {
                            msgBox.className = 'success';
                            msgBox.innerText = "Autoryzacja pomyślna! Otwieranie systemu...";
                            
                            // Aktualizujemy lokalną pamięć dla pozostałych skryptów
                            localStorage.setItem('urzadzenie_autoryzowane', 'TAK');
                            localStorage.setItem('licencja_id', znalezionyKlucz);
                            localStorage.setItem('uzytkownik_nick', daneKlucza.nick); 
                            
                            setTimeout(() => { window.location.replace('login.html'); }, 1000);
                        } else {
                            msgBox.className = 'error';
                            msgBox.innerText = "Twoja licencja została zablokowana przez Dowództwo.";
                            auth.signOut();
                        }
                    } else {
                        // Konto istnieje, ale nie ma klucza - idziemy do Aktywacji
                        pokazWidok('view-license');
                    }
                }).catch((error) => {
                    msgBox.className = 'error';
                    msgBox.innerText = "Błąd pobierania danych. Spróbuj ponownie.";
                    console.error(error);
                    auth.signOut();
                });
        }

        // --- 4. FUNKCJE LOGOWANIA I REJESTRACJI ---
        function zalogujEmailem() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return wyswietlBlad("Podaj e-mail i hasło.");
            
            auth.signInWithEmailAndPassword(e, p).catch(err => wyswietlBlad("Błędny e-mail lub hasło."));
        }

        function zarejestrujEmailem() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return wyswietlBlad("Podaj e-mail i hasło.");
            if(p.length < 6) return wyswietlBlad("Hasło musi mieć min. 6 znaków.");
            
            auth.createUserWithEmailAndPassword(e, p).catch(err => {
                if(err.code === 'auth/email-already-in-use') wyswietlBlad("Ten e-mail jest już zajęty.");
                else wyswietlBlad(err.message);
            });
        }

        function zalogujGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => wyswietlBlad("Logowanie Google anulowane."));
        }

        function wylogujKonto() {
            auth.signOut();
            localStorage.clear();
        }

        function wyswietlBlad(tekst) {
            msgBox.className = 'error';
            msgBox.innerText = tekst;
        }

        // --- 5. BINDOWANIE KLUCZA DO KONTA (Dla nowych) ---
        function aktywujUrzadzenie() {
            if (!currentUser) return;

            const nick = document.getElementById('nick').value.trim();
            const klucz = document.getElementById('klucz').value.trim();
            const btn = document.getElementById('btn-aktywuj');

            if (!nick) return wyswietlBlad("Musisz podać swój nick!");
            if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(klucz)) return wyswietlBlad("Nieprawidłowy format klucza!");

            msgBox.className = 'info';
            msgBox.innerText = "Weryfikacja i przypisywanie licencji do konta...";
            btn.disabled = true;

            database.ref('klucze/' + klucz).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const daneKlucza = snapshot.val();
                    
                    if (daneKlucza.aktywny !== true) {
                        btn.disabled = false;
                        return wyswietlBlad("Ten klucz został zablokowany.");
                    }
                    if (daneKlucza.nick !== nick) {
                        btn.disabled = false;
                        return wyswietlBlad("Zły Nick! Nie pasuje do tego klucza.");
                    }
                    if (daneKlucza.wykorzystany === true || daneKlucza.uid_wlasciciela) {
                        btn.disabled = false;
                        return wyswietlBlad("Ten klucz został już przypisany do innego konta!");
                    }

                    // ZAPIS W BAZIE - Plombowanie klucza z UID konta!
                    database.ref('klucze/' + klucz).update({ 
                        wykorzystany: true,
                        uid_wlasciciela: currentUser.uid 
                    }).then(() => {
                        msgBox.className = 'success';
                        msgBox.innerText = "Przypisano pomyślnie! Ładowanie systemu...";
                        
                        localStorage.setItem('urzadzenie_autoryzowane', 'TAK');
                        localStorage.setItem('licencja_id', klucz);
                        localStorage.setItem('uzytkownik_nick', nick); 
                        
                        setTimeout(() => { window.location.replace('login.html'); }, 1000);
                    }).catch((error) => {
                        btn.disabled = false;
                        wyswietlBlad("Błąd zapisu w bazie (Brak uprawnień).");
                        console.error(error);
                    });

                } else {
                    btn.disabled = false;
                    wyswietlBlad("Nie znaleziono takiego klucza.");
                }
            }).catch((error) => {
                btn.disabled = false;
                wyswietlBlad("Błąd połączenia z serwerem.");
            });
        }
    </script>
</body>
</html>
